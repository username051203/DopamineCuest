name: Generate Keystore (run once)

# Run this ONCE manually from GitHub Actions tab → Run workflow
# It prints your keystore as base64. Copy the output into your repo secrets.
# After that, delete or disable this workflow.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (e.g. dopaminequest)'
        required: true
        default: 'dopaminequest'
      store_password:
        description: 'Keystore password (make it strong)'
        required: true
      key_password:
        description: 'Key password (can be same as store password)'
        required: true
      validity_years:
        description: 'Validity in years'
        required: true
        default: '25'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity $(( ${{ github.event.inputs.validity_years }} * 365 )) \
            -alias "${{ github.event.inputs.key_alias }}" \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=DopamineQuest, OU=App, O=DopamineQuest, L=Unknown, S=Unknown, C=US" \
            -noprompt
          echo "Keystore generated"

      - name: Print base64 for KEYSTORE_BASE64 secret
        run: |
          echo "============================================"
          echo "Copy everything between the lines below"
          echo "and paste it as GitHub secret: KEYSTORE_BASE64"
          echo "============================================"
          base64 -w 0 keystore.jks
          echo ""
          echo "============================================"
          echo ""
          echo "Also set these secrets in your repo:"
          echo "  KEYSTORE_PASSWORD = ${{ github.event.inputs.store_password }}"
          echo "  KEY_ALIAS         = ${{ github.event.inputs.key_alias }}"
          echo "  KEY_PASSWORD      = ${{ github.event.inputs.key_password }}"

      - name: Cleanup
        if: always()
        run: rm -f keystore.jks
