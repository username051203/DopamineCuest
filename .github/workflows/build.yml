name: Build & Sign APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: DopamineQuest-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "Keystore: $(wc -c < keystore.jks) bytes"

      - name: Build release APK
        if: github.event_name != 'pull_request'
        run: gradle assembleRelease --stacktrace
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: DopamineQuest-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DopamineQuest v1.0.${{ github.run_number }}"
          body: |
            Automated build — commit ${{ github.sha }}
            Download the APK below and sideload on Android.
          files: app/build/outputs/apk/release/*.apk

      - name: Remove keystore
        if: always()
        run: rm -f keystore.jks
